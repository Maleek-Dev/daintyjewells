        <div class="ml-[250px] p-6">

        <div class="flex justify-center items-center overflow-x-auto bg-white rounded-lg shadow p-5"> 
        <form id="UserSignup" class="w-[70%] p-5 border border-gray-500/20">
    <div class="flex w-[100%] gap-10 ">
    <input type="text" id="first_name" placeholder="First Name" required class="w-[50%] p-3 border border-blue-100">
      <input type="text" id="last_name" placeholder="Last Name" required class="w-[50%] p-3 border border-blue-100">
    </div>
     <div class="flex w-[100%] gap-10 mt-7">
    <input type="email" id="email" placeholder="Email" required class="w-[50%] p-3 border border-blue-100">
    <input type="text" id="phone" placeholder="Phone" required class="w-[50%] p-3 border border-blue-100">
</div>

     <div class="flex w-[100%] gap-10 mt-7">
    <input type="password" id="password" placeholder="Password" required class="w-[47%] p-3 border border-blue-100">
</div>

    <button type="submit" class="cursor-pointer bg-[#202b3d] w-[20%] p-3 mt-7 text-white" id="createuser">Sign Up</button>
     <p class="mt-5">Already have an account? <a href="login.html" class="text-blue-500  ">Login</a></p>
